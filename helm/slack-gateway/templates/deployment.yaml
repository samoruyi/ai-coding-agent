apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "slack-gateway.fullname" . }}
  labels:
    {{- include "slack-gateway.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "slack-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "slack-gateway.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force a rollout when the secret content changes (only relevant when
        # we manage the Secret in-chart; harmless otherwise).
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "slack-gateway.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "slack-gateway.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
          env:
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: SLACK_GATEWAY_PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.config.temporalAddress | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.config.temporalNamespace | quote }}
            - name: TEMPORAL_TASK_QUEUE
              value: {{ .Values.config.temporalTaskQueue | quote }}
            - name: TEMPORAL_TLS
              value: {{ .Values.config.temporalTLS | quote }}
            - name: GITHUB_DEFAULT_OWNER
              value: {{ .Values.config.githubDefaultOwner | quote }}
            - name: GITHUB_DEFAULT_REPO
              value: {{ .Values.config.githubDefaultRepo | quote }}
          envFrom:
            - secretRef:
                name: {{ include "slack-gateway.secretName" . }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # readOnlyRootFilesystem requires writable /tmp for uvicorn.
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
